  <body>
    <header>
      <h1>ThorMax</h1>
      <h2>ThorMax - PRODUK PERTAMA YANG<br />BENAR-BENAR MEMPERBESAR PENIS</h2>
      <div class="gif-container">
        <!--        <video playsinline="" loop="" disableremoteplayback="" poster="img/poster.jpg" autoplay="" muted="" src="img/film1.mp4" class="gif img-responsive"></video>-->
        <!--        <center>-->
        <!--          <button id="muteButton" class="muted">BISU/TIDAK BISU</button>-->

        <img class="img-responsive" src="img/ex.png" alt="" />
        <img class="img-responsive" src="img/khasiat_ex.png" alt="" />
        <img class="img-responsive" src="img/testing_bambang_ex.png" alt="" />
        <img class="img-responsive" src="img/testi_trishas_ex.png" alt="" />
        <!-- <img class="gif img-responsive" src="img/halal_bpom.png" alt="" /> -->
        <img class="gif img-responsive" src="img/testi1.png" alt="" />
        <img class="gif img-responsive" src="img/testi_2.png" alt="" />
        <img class="gif img-responsive" src="img/testi_5.png" alt="" />
        <img class="gif img-responsive" src="img/geds.png" alt="" />
        <img class="img-responsive" src="img/garansi.png" alt="" />
      </div>
    </header>
    <div class="product">
      <div class="left">
        <img class="img-responsive" src="img/prod.png" alt="" />
      </div>
      <div class="right">
        <div class="old-price">
          <span
            ><s>
              <x-oldprice class="price_old al-cost-promo">€</x-oldprice>
            </s></span
          >
        </div>
        <div class="discount">
          <div>-50%</div>
        </div>
        <div class="discount-text">HARGA YANG LEBIH MURAH</div>
        <div class="price">
          <span
            ><b>
              <x-newprice class="price_main al-cost">€</x-newprice>
            </b></span
          >
        </div>
      </div>
    </div>
    <div>
      <div class="countdown-container">
        <h3>PROMOSI AKAN BERAKHIR</h3>
        <div class="countdown">
          <div class="countdown-item" id="hours">00</div>
          <div class="countdown-divider">:</div>
          <div class="countdown-item" id="min">15</div>
          <div class="countdown-divider">:</div>
          <div class="countdown-item" id="sec">42</div>
        </div>
        <div class="countdown-text">
          <span>jam</span>
          <span>menit</span>
          <span>detik</span>
        </div>
      </div>
      <form action="/land/order" class="al-form order_form" method="POST" id="order_form">
        <select class="al-country" name="country" style="display: none"></select>

        <div class="input-wrapper"><input class="name-input" name="name" placeholder="Nama" required="true" type="text" /></div>
        <div class="input-wrapper"><input class="phone-input" name="phone" placeholder="Nomor saya" required="true" type="text" /></div>
        <button class="button-submit" type="submit">
          <span class="button-submit-text button__text">Memesan</span>
          <span class="button-submit-arrow"></span>
        </button>
      </form>
    </div>
    <script src="js/jquery.js"></script>
    <script src="js/video.js"></script>
    <script src="js/countdown.js"></script>
    <script src="/tl-validator.js?country=id&label=false"></script>
